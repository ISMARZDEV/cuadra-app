name: ci

on:
  push:
    branches: [main]
  pull_request:

# Estrategia (ver docs): path-filter a nivel APP (capa 1); el backend corre la SUITE
# COMPLETA de todos los contextos (capa 2, el gate). NO se filtra por contexto en CI:
# un cambio en shared/ afecta a todos (riesgo de "under-building").
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cuadra
          POSTGRES_PASSWORD: cuadra
          POSTGRES_DB: cuadra
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cuadra"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://cuadra:cuadra@localhost:5433/cuadra
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run lint-imports                 # límites hexagonales (ADR 31/33)
      - run: uv run pytest -m "not integration"  # unit (rápido, fail-fast)
      - run: uv run alembic upgrade head         # schema para integration
      - run: uv run pytest -m integration        # integration (con DB)

  mobile:
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @cuadra/api-client's generated/ is gitignored (make openapi) — mobile typecheck imports
      # it, so it has to exist before tsc runs. No DB/server needed: openapi_dump introspects
      # the FastAPI app statically.
      - run: cd apps/api && uv sync && uv run python -m src.openapi_dump > openapi.json
      - run: pnpm --filter @cuadra/api-client generate
      - run: pnpm --filter @cuadra/mobile typecheck

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # api-client's generated/ is gitignored (make openapi) — web imports it, so regen first.
      - run: cd apps/api && uv sync && uv run python -m src.openapi_dump > openapi.json
      - run: pnpm --filter @cuadra/api-client generate
      - run: pnpm --filter @cuadra/web typecheck
      - run: pnpm --filter @cuadra/web test        # vitest: 33 + arquitectura/paridad + regresión SEO
