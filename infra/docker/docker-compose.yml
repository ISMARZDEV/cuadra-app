services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cuadra-db
    environment:
      POSTGRES_USER: cuadra
      POSTGRES_PASSWORD: cuadra
      POSTGRES_DB: cuadra
    ports:
      - "5433:5432"   # host 5433 (5432 ocupado por otro Postgres local)
    volumes:
      - cuadra_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuadra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cuadra_pg:
