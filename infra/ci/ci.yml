# GitHub Actions — CI del monorepo (ADR 23/27). Mover a .github/workflows/ci.yml al activar.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run lint-imports        # import-linter (ADR 33)
      - run: uv run pytest
      # - run: uv run alembic upgrade head   # (cuando haya migraciones + DB de CI)

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cuadra/mobile typecheck
